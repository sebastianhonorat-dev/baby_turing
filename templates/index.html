<!DOCTYPE html>
<html>
<head>
    <title>AI Search Lab</title>
    <style>
        body {
            background: #111;
            color: #eee;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        #status {
            margin: 20px;
            font-size: 20px;
        }

        .board {
            width: 324px;   /* 3 cells * 108px = 324px */
            height: 324px;  /* Locked height strictly matching width */
            margin: 0 auto 30px auto; /* 30px bottom margin prevents text overlap */
            display: grid;
            grid-template-columns: repeat(3, 108px);
            grid-template-rows: repeat(3, 108px); 
            gap: 0px; 
        }

        .cell {
            width: 108px;
            height: 108px;
            background: #222;
            border: 1px solid #333; /* Clean hairline grid */
            cursor: pointer;
            padding: 0;
            box-sizing: content-box; 
            background-size: 324px 324px; 
            background-repeat: no-repeat;
            transition: background-color 0.2s ease, border-color 0.4s ease; 
        }

        .cell:hover {
            background-color: #2a2a2a;
        }

        /* Victory Takeover */
        .board.victory-mode .cell {
            border-color: transparent; /* Makes gridlines dissolve into one image */
        }

        button {
            margin: 10px;
            padding: 10px 18px;
            font-size: 16px;
        }

        .metrics {
            margin-top: 20px;
        }
        
        .controls-group {
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<h1>Tic Tac Toe AI</h1>

<a href="/puzzle">Go to 8 Puzzle Solver</a>

<div id="status">Loading...</div>

<div class="board" id="board"></div>

<div class="controls-group">
    <label for="modeSelect">Game Mode: </label>
    <select id="modeSelect" onchange="handleModeChange()">
        <option value="pve">Player vs AI</option>
        <option value="eve">AI vs AI</option>
    </select>
</div>

<div class="controls-group">
    <div id="singleAlgoContainer">
        <label for="algoSelect">AI Algorithm: </label>
        <select id="algoSelect">
            <option value="Minimax">Minimax</option>
            <option value="Alpha-Beta">Alpha-Beta Pruning</option>
        </select>
    </div>
    
    <div id="dualAlgoContainer" style="display: none;">
        <label for="algoSelectX">AI X Algorithm: </label>
        <select id="algoSelectX">
            <option value="Minimax">Minimax</option>
            <option value="Alpha-Beta" selected>Alpha-Beta Pruning</option>
        </select>
        
        <label for="algoSelectO" style="margin-left: 15px;">AI O Algorithm: </label>
        <select id="algoSelectO">
            <option value="Minimax">Minimax</option>
            <option value="Alpha-Beta">Alpha-Beta Pruning</option>
        </select>
    </div>
</div>

<div>
    <button onclick="resetGame()">Reset Game</button>
</div>

<div class="metrics">
    <p>Moves: <span id="moves">0</span></p>
    <p>Nodes Explored: <span id="nodes">--</span></p>
    <p>Decision Time: <span id="time">--</span></p>
</div>

<script>
let state = null;
let isAiThinking = false;

// Track your available image folders
const imageSets = ['set_1', 'set_2', 'set_3'];
let currentSet = 'set_1'; 

function pickRandomImageSet() {
    const randomIndex = Math.floor(Math.random() * imageSets.length);
    currentSet = imageSets[randomIndex];
    console.log("Active image set for this round:", currentSet);
}

async function loadState() {
    const response = await fetch('/ttt/state');
    state = await response.json();

    renderBoard();
    renderStatus();
}

function renderBoard() {
    const boardDiv = document.getElementById('board');
    boardDiv.innerHTML = '';

    const winningSymbol = state.winner === 'X' ? 'x' : (state.winner === 'O' ? 'o' : null);

    if (winningSymbol) {
        boardDiv.classList.add('victory-mode');
    } else {
        boardDiv.classList.remove('victory-mode');
    }

    // Get the current game mode ('pve' or 'eve')
    const gameMode = document.getElementById('modeSelect').value;

    state.board.forEach((cell, index) => {
        const btn = document.createElement('button');
        btn.className = 'cell';
        
        const col = index % 3;
        const row = Math.floor(index / 3);
        const xOffset = col * 108; 
        const yOffset = row * 108; 

        btn.style.backgroundPosition = `-${xOffset}px -${yOffset}px`;
        btn.style.backgroundSize = "324px 324px"; 

        if (winningSymbol) {
            btn.style.backgroundImage = `url('/images/${currentSet}/${winningSymbol}')`;
        } else {
            if (cell === 'X') {
                btn.style.backgroundImage = `url('/images/${currentSet}/x')`;
            } else if (cell === 'O') {
                btn.style.backgroundImage = `url('/images/${currentSet}/o')`;
            } else {
                btn.style.backgroundImage = 'none'; 
            }
        }

        btn.onclick = () => playMove(index);

        // FOOLPROOF DISABLE LOGIC:
        // 1. Always disable if the game is over or cell is already taken
        if (state.status !== 'playing' || cell === 'X' || cell === 'O') {
            btn.disabled = true;
        } 
        // 2. Disable in AI vs AI mode (the computer handles everything)
        else if (gameMode === 'eve') {
            btn.disabled = true;
        } 
        // 3. In Player vs AI mode, disable ONLY if it is not X's turn
        else if (gameMode === 'pve' && state.turn !== 'X') {
            btn.disabled = true;
        }

        boardDiv.appendChild(btn);
    });

    document.getElementById('moves').innerText = state.move_count;
    document.getElementById('nodes').innerText = state.last_nodes ?? '--';
    document.getElementById('time').innerText = state.last_time ?? '--';
}

function renderStatus() {
    const status = document.getElementById('status');
    const gameMode = document.getElementById('modeSelect').value;

    if (state.status === 'draw') {
        status.innerText = 'Draw!';
        return;
    }

    if (state.status === 'win') {
        status.innerText = state.winner + ' wins!';
        return;
    }

    if (gameMode === 'eve') {
        status.innerText = `AI vs AI Processing (${state.turn}'s turn)...`;
        setTimeout(runAI, 600); 
    } else {
        if (state.turn === 'X') {
            status.innerText = 'Your Turn (X)';
        } else {
            status.innerText = 'AI Turn (O)...';
            setTimeout(runAI, 500); 
        }
    }
}

function handleModeChange() {
    const gameMode = document.getElementById('modeSelect').value;
    const singleContainer = document.getElementById('singleAlgoContainer');
    const dualContainer = document.getElementById('dualAlgoContainer');

    if (gameMode === 'eve') {
        singleContainer.style.display = 'none';
        dualContainer.style.display = 'block';
    } else {
        singleContainer.style.display = 'block';
        dualContainer.style.display = 'none';
    }
    
    if (state) { 
        renderBoard(); 
        renderStatus(); 
    }
}

async function playMove(cell) {
    if (isAiThinking || state.status !== 'playing') return;
    
    await fetch('/ttt/move/' + cell, {
        method: 'POST'
    });
    await loadState();
}

async function runAI() {
    if (isAiThinking || state.status !== 'playing') return;
    
    const gameMode = document.getElementById('modeSelect').value;
    let selectedAlgo;

    if (gameMode === 'eve') {
        selectedAlgo = (state.turn === 'X') 
            ? document.getElementById('algoSelectX').value 
            : document.getElementById('algoSelectO').value;
    } else {
        if (state.turn !== 'O') return; 
        selectedAlgo = document.getElementById('algoSelect').value;
    }
    
    isAiThinking = true;
    try {
        await fetch('/ttt/ai_move', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                algorithm: selectedAlgo 
            })
        });
        await loadState();
    } catch (error) {
        console.error("AI Move failed:", error);
    } finally {
        isAiThinking = false;
    }
}

async function resetGame() {
    isAiThinking = false;
    pickRandomImageSet(); 
    await fetch('/ttt/reset', {
        method: 'POST'
    });
    await loadState();
}

// Initial Boot Sequence
pickRandomImageSet(); 
loadState();
</script>

</body>
</html>
